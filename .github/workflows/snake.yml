name: Generate Snake

on:
  # Atualiza a cobrinha automaticamente a cada 12 horas
  schedule:
    - cron: "0 */12 * * *"
  # Permite rodar manualmente na aba "Actions" do GitHub
  workflow_dispatch:
  # Atualiza também a cada push na branch main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gera o SVG da cobrinha
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publica o SVG na branch "output"
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
